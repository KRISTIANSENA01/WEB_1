<article class="auth-panel login-panel active" id="login-panel">
  <h2>Iniciar sesi&oacute;n</h2>
  <form id="loginForm">
    <label>
      Correo:
      <input id="login-email" type="email" placeholder="correo@ejemplo.com" required />
    </label>
    <label>
      Contrase&ntilde;a:
      <input id="login-password" type="password" placeholder="********" required />
    </label>
    <button type="submit" class="solid" id="login-submit">Ingresar</button>
  </form>
  <p id="loginMessage" class="auth-message"></p>
  <p class="auth-toggle">
    &iquest;No tienes cuenta?
    <button type="button" data-auth-view="register-panel">Reg&iacute;strate</button>
  </p>
</article>
