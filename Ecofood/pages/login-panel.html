<article class="auth-panel login-panel active" id="login-panel">
  <h2>Iniciar sesi&oacute;n</h2>
  <form>
    <label>
      Correo:
      <input type="email" placeholder="correo@ejemplo.com" required />
    </label>
    <label>
      Contrase&ntilde;a:
      <input type="password" placeholder="********" required />
    </label>
    <button type="button" class="solid" id="login-submit">Ingresar</button>
  </form>
  <p class="auth-toggle">
    &iquest;No tienes cuenta?
    <button type="button" data-auth-view="register-panel">Reg&iacute;strate</button>
  </p>
</article>
