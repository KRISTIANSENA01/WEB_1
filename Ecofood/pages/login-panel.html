<link rel="stylesheet" href="../css/styles.css" />
<article class="login__panel login__panel--login active" id="login-panel">
  <h2>Iniciar sesión</h2>
  <form class="login__form">
    <label>
      Correo:
      <input type="email" placeholder="correo@ejemplo.com" />
    </label>
    <label>
      Contraseña:
      <input type="password" placeholder="********" />
    </label>
    <button type="button" class="solid login__submit">Ingresar</button>
  </form>
  <p class="login__hint">
    ¿No tienes cuenta?
    <button type="button" class="login__switch" data-view="register">Regístrate</button>
  </p>
</article>
<script src="../js/app.js"></script>
