<article class="auth-panel" id="register-panel">
  <h2>Crear cuenta</h2>
  <form>
    <label>
      Nombre:
      <input type="text" placeholder="Nombre completo" />
    </label>
    <label>
      Correo:
      <input type="email" placeholder="correo@ejemplo.com" />
    </label>
    <label>
      Contrase&ntilde;a:
      <input type="password" placeholder="********" />
    </label>
    <label>
      Tipo de usuario:
      <input type="text" placeholder="Donante / Beneficiario" />
    </label>
    <button type="button" class="solid">Registrarse</button>
  </form>
  <p class="auth-toggle">
    &iquest;Ya tienes cuenta?
    <button type="button" data-auth-view="login-panel">Inicia sesi&oacute;n</button>
  </p>
</article>
