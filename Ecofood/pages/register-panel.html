<article class="auth-panel" id="register-panel">
  <h2>Crear cuenta</h2>
  <form id="registerForm">
    <label>
      Nombre:
      <input id="register-name" type="text" placeholder="Nombre completo" required />
    </label>
    <label>
      Correo:
      <input id="register-email" type="email" placeholder="correo@ejemplo.com" required />
    </label>
    <label>
      Contrase&ntilde;a:
      <input id="register-password" type="password" placeholder="********" required />
    </label>
    <button id="register-submit" type="submit" class="solid">Registrarse</button>
  </form>
  <p id="registerMessage" class="auth-message"></p>
  <p class="auth-toggle">
    &iquest;Ya tienes cuenta?
    <button type="button" data-auth-view="login-panel">Inicia sesi&oacute;n</button>
  </p>
</article>
