<article class="login__panel login__panel--register" id="register-panel">
  <h2>Crear cuenta</h2>
  <form class="login__form">
    <label>
      Nombre:
      <input type="text" placeholder="Nombre completo" />
    </label>
    <label>
      Correo:
      <input type="email" placeholder="correo@ejemplo.com" />
    </label>
    <label>
      Contraseña:
      <input type="password" placeholder="********" />
    </label>
    <label>
      Tipo de usuario:
      <input type="text" placeholder="Donante / Beneficiario" />
    </label>
    <button type="button" class="solid">Registrarse</button>
  </form>
  <p class="login__hint">
    ¿Ya tienes cuenta?
    <button type="button" class="login__switch" data-view="login">Inicia sesión</button>
  </p>
</article>
